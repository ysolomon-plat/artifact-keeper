name: CI

on:
  push:
    branches: [main, master, develop, 'release/**']
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.beads/**'
      - 'LICENSE'
      - 'CLAUDE.md'
  pull_request:
    branches: [main, master, develop, 'release/**']
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.beads/**'
      - 'LICENSE'
      - 'CLAUDE.md'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency: keyed by `event_name` + `ref` so push, pull_request, and
# workflow_dispatch are isolated from each other. `cancel-in-progress` is
# only true for auto-triggered runs (push / pull_request); a manual run
# (`workflow_dispatch`) is never cancelled by a subsequent push.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # TIER 1: FAST CI (Every Push/PR) - Target: < 5 minutes
  # ════════════════════════════════════════════════════════════════════════════

  check-rust:
    name: 🦀 Check Rust
    runs-on: ak-ci-runners
    timeout-minutes: 20
    # Disable debuginfo to cut peak compile memory on the ARC runner. The
    # lib-test target compile was OOMing ("sccache: Compile terminated by
    # signal 9", #1515) even with CARGO_BUILD_JOBS capped; debuginfo is the
    # largest memory contributor for a crate this size and is not needed for
    # fmt/clippy.
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      # Bypass sccache while the ak-ci-runners /cache volume / sccache server is
      # unavailable ("Cannot open/write log file '/cache/sccache-error.log'",
      # "Timed out waiting for server startup"), which fails every sccache-wrapped
      # rustc invocation at ~50s. Mirrors the coverage job's RUSTC_WRAPPER override;
      # the Swatinem rust-cache still caches deps. Revert once the runner is restored.
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Cache the dependency build so only the workspace crate recompiles.
      # ~635 deps are byte-identical run-to-run; cold compile was ~9m.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Forbidden-pattern gate (#1316): authorization on API-token scopes must
      # use the canonical `token_service::scopes_grant_access` helper, never an
      # inline `== "admin"` / `.any(|s| s == "admin")` raw-string scope match.
      # This grep gate fails the build if the legacy idiom reappears in
      # backend/src (test modules and the canonical helper are excluded).
      - name: No legacy admin scope check
        run: ./scripts/ci/check-no-legacy-admin-scope.sh

      # Token-minting surface pin (#1315, epic #1617 -> #1615): every handler
      # that calls AuthService::generate_api_token must be in the reviewed set
      # and carry its reject rule (enforce_admin_only_scopes or require_admin).
      # A new token-minting endpoint added without updating the pinned list
      # fails the build, forcing a deliberate review of the privilege-escalation
      # surface.
      - name: Pin token-minting endpoint surface
        run: ./scripts/ci/check-token-mint-surface.sh

      # Auth-event audit completeness (#1617 Phase 1): every token mint/revoke
      # handler must emit an ApiTokenCreated/ApiTokenRevoked audit event, and
      # every federated (OIDC/SAML/LDAP) login must audit its Login/LoginFailed
      # outcome. Guards the compliance audit trail against silent regression.
      - name: Check auth-event audit coverage
        run: ./scripts/ci/check-auth-event-audit.sh

      - name: Run Clippy
        # Cap parallel rustc invocations so the lib-test compile doesn't OOM
        # the ARC runner pod ("sccache: Compile terminated by signal 9",
        # #1515/#1594). Lowered 4 → 2 (#1679): under concurrent PR load the
        # lib-test target still OOM-killed at 4, so fewer parallel codegen
        # units cut peak RSS further. CARGO_INCREMENTAL=0 disables incremental
        # codegen (`-C incremental=...`), which was observed ON during the
        # failing compile and inflates peak memory — incremental is useless in
        # CI's clean checkout anyway. Lint set is unchanged.
        env:
          CARGO_BUILD_JOBS: "2"
          CARGO_INCREMENTAL: "0"
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Hit-rate data to evaluate dropping the Swatinem rust-cache step once sccache sustains >80% hits.
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test-backend-unit:
    name: 🧪 Backend Unit Tests
    runs-on: ak-ci-runners
    timeout-minutes: 25
    # Same memory guard as check-rust: drop debuginfo and cap parallel rustc
    # so the lib-test compile does not OOM the runner (#1515). This step
    # previously had no CARGO_BUILD_JOBS cap and could spawn one rustc per
    # core, which is what tipped it over. Jobs raised 4 -> 8 with the same
    # measured basis as the coverage job (7.9-11.0 GiB peak RSS at 8 jobs
    # with debuginfo=0 — and this compile is lighter, no instrumentation).
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_BUILD_JOBS: "8"
      # Disable incremental codegen (#1679): this job compiles the same
      # lib-test crate that OOM-killed check-rust, and incremental is useless
      # in CI's clean checkout while inflating peak RSS.
      CARGO_INCREMENTAL: "0"
      # Bypass sccache while the ak-ci-runners /cache volume / sccache server is
      # unavailable (see check-rust). Without this, every rustc invocation fails
      # at ~50s ("Timed out waiting for server startup"). Revert once restored.
      RUSTC_WRAPPER: ""
    services:
      # The lib tests include DB-backed cases (OCI blob GC, blob refs, the
      # readiness gate) that silently no-op via `Fixture::setup` when
      # DATABASE_URL is unset. Provide the same Postgres the coverage job uses
      # so they actually run (#1409 review).
      postgres:
        image: ghcr.io/artifact-keeper/ci-mirror/postgres:16-alpine
        env:
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
          POSTGRES_DB: artifact_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Separate cache key from check-rust: same target dir but a different
      # build profile (test vs clippy), so they must not share a cache.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: unit

      # Catch migration-slot collisions before they reach the e2e/nightly job.
      # The nightly run on 2026-05-09 (#1128) crashed at startup with
      # `duplicate key value violates unique constraint "_sqlx_migrations_pkey"
      # Key (version)=(73)` because a forward-port attempted to reuse a slot
      # already taken on main. A cheap filename-prefix dedup catches the
      # entire class of failures without needing a Postgres to apply them.
      - name: Lint migration slots are unique
        run: |
          set -euo pipefail
          # Glob-based to keep shellcheck (SC2010/SC2012) happy and handle
          # filenames with spaces, though migrations follow `NNN_*.sql`.
          slots=$(for f in backend/migrations/*.sql; do
            basename "$f" | awk -F_ '{print $1}'
          done)
          dupes=$(echo "$slots" | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::duplicate migration version slot(s): $dupes"
            pattern=$(echo "$dupes" | paste -sd'|' -)
            for f in backend/migrations/*.sql; do
              name=$(basename "$f")
              echo "$name" | grep -E "^(${pattern})_" || true
            done
            exit 1
          fi

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          # The service --health-cmd already runs pg_isready, but the step can
          # start before health flips to "healthy" on slower runners. A short
          # TCP readiness loop avoids a flaky first connect.
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then
              echo "Postgres reachable on attempt $i"
              exit 0
            fi
            echo "  waiting for postgres... ($i/30)"
            sleep 1
          done
          echo "ERROR: Postgres did not become reachable within 30s"
          exit 1

      - name: Run database migrations
        run: sqlx migrate run --source backend/migrations
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry

      - name: Run unit tests
        env:
          # SQLX_OFFLINE keeps the build using the committed .sqlx cache;
          # DATABASE_URL lets the DB-backed lib tests run for real against the
          # Postgres service above instead of no-op'ing.
          SQLX_OFFLINE: true
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          JWT_SECRET: ci-coverage-secret-at-least-32-bytes-long-for-tests
        # nextest runs each test in its own process and applies the repo's
        # .config/nextest.toml db-serial test groups, which serialize the
        # global-DB-state suites (stuck-scan cleanup, storage GC) that the
        # previous single-threaded `cargo test -- --test-threads=1` run was
        # protecting. The coverage job already executes this exact suite
        # under nextest at 8 threads.
        run: cargo nextest run --workspace --lib --test-threads 8

      # Hit-rate data to evaluate dropping the Swatinem rust-cache step once sccache sustains >80% hits.
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  shell-tests:
    name: 🐚 Shell Tests
    runs-on: ubuntu-latest
    # Self-contained bash + python3 regression tests for docker/ init scripts.
    # Runs in seconds and uses only the dependencies pre-installed on the
    # ubuntu-latest image (bash, python3, jq, curl). Kept off the Rust
    # critical path so it does not gate cargo jobs.
    # Cap wall-clock so a hung mock HTTP server (Python BaseHTTPRequestHandler
    # blocking in serve_forever) cannot pin a Tier 1 required check for the
    # 6h GitHub default. The whole script runs in well under a minute.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: dtrack-init regression test
        run: bash docker/test-init-dtrack.sh

  coverage:
    name: 📊 Code Coverage
    runs-on: ak-ci-runners
    timeout-minutes: 35
    # Memory guards for the instrumented lib-test compile (#1679/#1680,
    # extended here to the coverage job). This job builds the same lib-test
    # crate that OOM-killed check-rust, but under `-C instrument-coverage`
    # *and* `-C debuginfo=2` — the heaviest compile in CI, which got SIGKILL'd
    # (OOM) on larger PRs. CARGO_INCREMENTAL=0 drops incremental codegen
    # (useless in a clean checkout) and dropping debuginfo cuts peak RSS the
    # most. Coverage mapping comes from the instrumentation (`__llvm_covmap`),
    # not DWARF, so debuginfo=0 does not affect line-coverage accuracy.
    #
    # CARGO_BUILD_JOBS was capped at 2 when this job ran with debuginfo and
    # an 8Gi runner limit; both changed since (#2062 raised limits to 16Gi,
    # debuginfo=0 above). The same instrumented compile at 8 jobs with
    # debuginfo=0 measures 7.9-11.0 GiB peak anonymous RSS, comfortably
    # inside 16Gi, and matches the runner's 8-cpu limit.
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "8"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    services:
      postgres:
        # Use the GHCR mirror maintained by .github/workflows/mirror-images.yml
        # to avoid Docker Hub anonymous-pull rate limits, which were aborting
        # the coverage job before tests could compile.
        image: ghcr.io/artifact-keeper/ci-mirror/postgres:16-alpine
        env:
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
          POSTGRES_DB: artifact_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Skip the expensive coverage build on PRs that touch no Rust source.
      # Dependency bumps (Cargo.toml/Cargo.lock only), workflow edits, and
      # docs-only changes cannot move coverage numbers, and the Backend Unit
      # Tests job already validates the build. `rust_changed=true` for push
      # events preserves the existing behavior on main.
      - name: Detect Rust source changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fetch the base branch into a STABLE named remote-tracking ref
          # (origin/$BASE) instead of relying on the volatile FETCH_HEAD. A bare
          # `git fetch ... origin $BASE` only writes FETCH_HEAD, which any later
          # fetch overwrites and which races the on-disk shallow file
          # ("fatal: shallow file has changed since we read it"). A named ref is
          # deterministic and never clobbered. (#1798/#1799/#1812/#1813/#1815)
          BASE="${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          if git diff --name-only "origin/$BASE" -- '*.rs' | grep -q .; then
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust_changed=false" >> "$GITHUB_OUTPUT"
            echo "### Coverage: skipped (no Rust source changes in this PR)" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Distinct cache key: the instrumented coverage build is incompatible
      # with the clippy/unit profiles, and cargo-llvm-cov builds into
      # target/llvm-cov-target, so point rust-cache there or it caches an
      # empty target/ and silently no-ops.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.detect.outputs.rust_changed == 'true'
        with:
          shared-key: coverage
          workspaces: ". -> target/llvm-cov-target"

      # cargo-nextest is baked into the runner image at a pinned version
      # (ghcr.io/artifact-keeper/ak-runner-rust, see artifact-keeper-iac
      # runner-images/rust/Dockerfile) -- no per-run install needed.

      - name: Run database migrations
        if: steps.detect.outputs.rust_changed == 'true'
        run: sqlx migrate run --source backend/migrations
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry

      - name: Generate coverage report
        if: steps.detect.outputs.rust_changed == 'true'
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          SQLX_OFFLINE: true
          RUSTC_WRAPPER: ""
          # SSO credential encryption tests in auth_config_service rely on at
          # least one of these env vars being set. They skip cleanly when
          # unset (preserving local `cargo test` ergonomics), so we provide a
          # deterministic value here to exercise the create/update/decrypt
          # paths in coverage. The encryption_key panic-when-unset test
          # explicitly skips when this is set.
          JWT_SECRET: ci-coverage-secret-at-least-32-bytes-long-for-tests
        # nextest runs each test in its own process for faster scheduling.
        # Test concurrency was capped at 4 to keep parallel test processes
        # from OOMing the memory-limited ARC runner (cf. the #1515 compile
        # OOM); raised to 8 here to measure test-phase scaling now that the
        # per-process profraw I/O is pooled — revert to 4 if runner memory
        # pressure appears.
        #
        # Profile counters are written through an LLVM %Nm merge pool instead
        # of cargo-llvm-cov's default one-.profraw-per-test-process: with
        # ~12k test processes the per-process files cost tens of GB of write
        # I/O per run, while the pool online-merges the same counters into at
        # most 32 files (~92MB) with byte-equal coverage aggregates. The
        # explicit `clean --workspace` keeps the implicit-clean semantics the
        # single `cargo llvm-cov nextest` invocation had.
        run: |
          source <(cargo llvm-cov show-env --sh)
          export LLVM_PROFILE_FILE="${LLVM_PROFILE_FILE%/*}/%32m.profraw"
          cargo llvm-cov clean --workspace
          cargo nextest run --workspace --lib --test-threads 8
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coverage summary and gate
        if: steps.detect.outputs.rust_changed == 'true'
        run: |
          # cargo llvm-cov report resolves the profile directory from the
          # show-env environment; without it, a fresh step shell looks in
          # the default location and misses the pooled .profraw files.
          source <(cargo llvm-cov show-env --sh)

          # Total project coverage summary
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo llvm-cov report --summary-only 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Total coverage floor (never let overall coverage drop below 50%)
          cargo llvm-cov report --fail-under-lines 50

      - name: New code coverage gate
        if: github.event_name == 'pull_request' && steps.detect.outputs.rust_changed == 'true'
        run: |
          # Fetch base branch so we can diff against it (checkout is shallow by default).
          #
          # Fetch the base into a STABLE named remote-tracking ref (origin/$BASE)
          # rather than relying on the volatile FETCH_HEAD. The previous code did
          # two fetches in a row — `git fetch ... origin $BASE` (set FETCH_HEAD)
          # then `git fetch --deepen=200 origin` — and the second fetch rewrote the
          # on-disk shallow file and clobbered/ambiguated FETCH_HEAD while later
          # commands were still reading it, producing the intermittent
          #   fatal: shallow file has changed since we read it
          #   fatal: ambiguous argument 'FETCH_HEAD': unknown revision ...
          #   ##[error]Process completed with exit code 128
          # that failed PRs with no real coverage problem
          # (#1798/#1799/#1812/#1813/#1815). A named ref is written atomically and
          # never overwritten by a subsequent fetch, so it is race-free.
          #
          # Deepen BOTH the base branch AND the PR head: the head is checked out
          # shallow (fetch-depth: 1), so without head-side history `git merge-base`
          # has nothing to walk on the head side and finds no common ancestor.
          # Deepening only the base (the original #1671 behavior) is not enough.
          # The deepen targets the head and does NOT touch origin/$BASE, so the ref
          # we diff against is resolved deterministically regardless of its outcome.
          BASE="${{ github.base_ref }}"
          git fetch --no-tags --depth=200 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          git fetch --no-tags --deepen=200 origin "$BASE" || true

          # Diff against the MERGE-BASE between the PR head and the base branch tip,
          # NOT the raw base tip (origin/$BASE). Diffing against the tip counts changes
          # from OTHER PRs that merged after this branch was cut as a phantom delta,
          # producing false coverage failures on stale branches (see issue #1646).
          # The merge-base is where this branch actually diverged, so the diff
          # reflects only the lines THIS branch changed.
          #
          # `git merge-base` exits non-zero when it cannot find a common ancestor
          # (e.g. the shallow clone is still missing it). This step runs under the
          # default `bash -e`, so an unguarded command substitution would ABORT the
          # whole step here, before the `if [ -z ]` fallback could run — a false
          # coverage failure rather than a graceful degrade (regression #1689 from
          # #1671). `2>/dev/null || true` keeps the step alive so the fallback runs.
          MERGE_BASE=$(git merge-base "origin/$BASE" HEAD 2>/dev/null || true)
          if [ -z "$MERGE_BASE" ]; then
            echo "::warning::Could not compute merge-base on shallow clone; falling back to base tip (issue #1646 trade-off)"
            MERGE_BASE=$(git rev-parse "origin/$BASE")
          fi
          echo "Diffing new code against merge-base: $MERGE_BASE"
          export MERGE_BASE

          # Check coverage on new/changed lines only (not the entire file).
          # Uses unified diff to extract exact line numbers that were added or modified,
          # then cross-references with lcov to measure coverage of those specific lines.
          CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" -- '*.rs' 2>/dev/null || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No .rs files changed, skipping new code coverage check"
            echo "### New Code Coverage: N/A (no Rust changes)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Parse the unified diff to find which lines were added/changed in each file,
          # then cross-reference with lcov.info to compute coverage on those lines only.
          RESULT=$(python3 -c "
          import subprocess, re, os

          # Step 1: Parse unified diff to find added line numbers per file.
          # Diff against the merge-base (passed in via env) so intervening merges
          # from other PRs do not show up as a phantom delta (issue #1646).
          merge_base = os.environ['MERGE_BASE']
          diff = subprocess.run(
              ['git', 'diff', '-U0', merge_base, '--', '*.rs'],
              capture_output=True, text=True
          ).stdout

          new_lines = {}  # filename -> set of added line numbers
          current_file = None
          for line in diff.split('\n'):
              if line.startswith('+++ b/'):
                  current_file = line[6:]
              elif line.startswith('@@') and current_file:
                  # Parse @@ -old,count +new,count @@ format
                  m = re.search(r'\+(\d+)(?:,(\d+))?', line)
                  if m:
                      start = int(m.group(1))
                      count = int(m.group(2)) if m.group(2) else 1
                      if current_file not in new_lines:
                          new_lines[current_file] = set()
                      for i in range(start, start + count):
                          new_lines[current_file].add(i)

          if not new_lines:
              print('none')
          else:
              # Step 2: Parse lcov.info and check coverage only for new lines
              hit = miss = 0
              lcov_file = None
              lcov_match = None
              for line in open('lcov.info'):
                  line = line.strip()
                  if line.startswith('SF:'):
                      path = line[3:]
                      lcov_match = None
                      for f, lines in new_lines.items():
                          if path.endswith(f):
                              lcov_match = lines
                              break
                  elif line.startswith('DA:') and lcov_match is not None:
                      parts = line[3:].split(',')
                      lineno = int(parts[0])
                      count = int(parts[1])
                      if lineno in lcov_match:
                          if count > 0:
                              hit += 1
                          else:
                              miss += 1
              total = hit + miss
              if total == 0:
                  print('none')
              else:
                  pct = (hit * 100) // total
                  print(f'{pct} {hit} {total}')
          ")

          if [ "$RESULT" = "none" ]; then
            echo "No instrumented lines in new code"
            echo "### New Code Coverage: N/A (no instrumented new lines)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          PCT=$(echo "$RESULT" | awk '{print $1}')
          HIT=$(echo "$RESULT" | awk '{print $2}')
          TOTAL=$(echo "$RESULT" | awk '{print $3}')

          echo "### New Code Coverage: ${PCT}% (${HIT}/${TOTAL} new lines)" >> $GITHUB_STEP_SUMMARY
          echo "New code coverage: ${PCT}% (${HIT}/${TOTAL} new lines)"

          # Skip gate for very small changes (< 10 instrumented new lines) since
          # the percentage is statistically noisy at that scale
          if [ "$TOTAL" -lt 10 ]; then
            echo "Too few new lines ($TOTAL) to enforce coverage gate, skipping"
            echo "Skipped: fewer than 10 instrumented new lines" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ "$PCT" -lt 70 ]; then
            echo "::error::New code coverage is ${PCT}%, below 70% threshold"
            echo "Coverage on new/changed lines is below 70%. Add tests for new code." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Setup Node.js for jscpd
        if: always() && github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Code duplication gate
        if: always() && github.event_name == 'pull_request'
        run: |
          # Install jscpd (copy-paste detector, same approach as SonarCloud's CPD engine)
          npm install -g jscpd@4 --silent

          # Get changed .rs files. Fetch the base into a STABLE named
          # remote-tracking ref (origin/$BASE) rather than the volatile FETCH_HEAD:
          # a later fetch (or the coverage gate's deepen in the same job) rewrites
          # the shallow file and clobbers FETCH_HEAD mid-read, causing the
          # intermittent "fatal: shallow file has changed since we read it" /
          # "ambiguous argument 'FETCH_HEAD'" exit-128 flake. A named ref is
          # race-free. (#1798/#1799/#1812/#1813/#1815)
          #
          # Diff against the MERGE-BASE between the PR head and the base branch
          # tip, NOT the raw base tip — the same #1646 fix the coverage gate
          # already has. Diffing against the tip counts files changed by OTHER
          # PRs that merged after this branch was cut as a phantom delta, so a
          # stale branch inherits e.g. formats/helm.rs (and its pre-existing
          # clones) from main and fails the gate on code it never touched
          # (#1824/#1825/#1827/#1796 all failed on identical helm.rs clones).
          BASE="${{ github.base_ref }}"
          git fetch --no-tags --depth=200 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE" 2>/dev/null || true
          git fetch --no-tags --deepen=200 origin "$BASE" 2>/dev/null || true
          MERGE_BASE=$(git merge-base "origin/$BASE" HEAD 2>/dev/null || true)
          if [ -z "$MERGE_BASE" ]; then
            echo "::warning::Could not compute merge-base on shallow clone; falling back to base tip (issue #1646 trade-off)"
            MERGE_BASE=$(git rev-parse "origin/$BASE")
          fi
          echo "Diffing changed files against merge-base: $MERGE_BASE"
          CHANGED_RS=$(git diff --name-only "$MERGE_BASE" -- '*.rs' 2>/dev/null | grep -v '_test\|tests/' || true)

          # Exclude the per-ecosystem package-format handlers
          # (backend/src/api/handlers/<format>.rs). These are inherent structural
          # near-duplicates of one another (~18% cross-file duplication on main,
          # dominant clones are whole-file matches like sbt.rs <-> vscode.rs incl.
          # the shared import block). Without this exclusion ANY PR that legitimately
          # edits the download/upload path across several formats trips the 3% gate
          # regardless of code quality (#1704). The exclusion list is the single
          # source of truth in .jscpd.json; we filter the changed-file list here
          # rather than relying on jscpd's own ignore globs so the behavior is
          # deterministic regardless of jscpd version. The gate stays STRICT on all
          # other code (services, storage, middleware, non-format handlers, ...)
          # where duplication is a real smell.
          IGNORE_RE=$(python3 -c "
          import json, re
          cfg = json.load(open('.jscpd.json'))
          pats = [p for p in cfg.get('ignore', []) if p.startswith('backend/src/api/handlers/')]
          print('|'.join(re.escape(p) for p in pats))
          ")
          if [ -n "$IGNORE_RE" ]; then
            CHANGED_RS=$(printf '%s\n' "$CHANGED_RS" | grep -Ev "^(${IGNORE_RE})$" || true)
          fi

          if [ -z "$CHANGED_RS" ]; then
            echo "No measurable .rs source files changed (none, or only ignored format handlers), skipping duplication check"
            echo "### Code Duplication: N/A (no measurable Rust changes)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Write changed files to a list for jscpd
          echo "$CHANGED_RS" > /tmp/changed-files.txt

          # Run jscpd on the filtered changed files (min 10 lines, threshold 3%).
          RESULT=$(jscpd --min-lines 10 --threshold 3 --reporters json \
            --format rust --output /tmp/jscpd-report \
            $(echo "$CHANGED_RS" | tr '\n' ' ') 2>&1) || true

          # Parse results
          if [ -f /tmp/jscpd-report/jscpd-report.json ]; then
            DUP_PCT=$(python3 -c "
          import json
          data = json.load(open('/tmp/jscpd-report/jscpd-report.json'))
          stats = data.get('statistics', {})
          total = stats.get('total', {})
          pct = total.get('percentage', 0)
          dups = total.get('duplicatedLines', 0)
          lines = total.get('lines', 0)
          clones = len(data.get('duplicates', []))
          print(f'{pct:.1f} {dups} {lines} {clones}')
          " 2>/dev/null) || DUP_PCT="0.0 0 0 0"

            PCT=$(echo "$DUP_PCT" | awk '{print $1}')
            DUP_LINES=$(echo "$DUP_PCT" | awk '{print $2}')
            TOTAL_LINES=$(echo "$DUP_PCT" | awk '{print $3}')
            CLONES=$(echo "$DUP_PCT" | awk '{print $4}')

            echo "### Code Duplication: ${PCT}% (${DUP_LINES}/${TOTAL_LINES} lines, ${CLONES} clones)" >> $GITHUB_STEP_SUMMARY
            echo "Duplication: ${PCT}% (${DUP_LINES}/${TOTAL_LINES} lines, ${CLONES} clones)"

            # Fail if duplication exceeds 3%
            OVER=$(python3 -c "print('yes' if float('${PCT}') > 3.0 else 'no')")
            if [ "$OVER" = "yes" ]; then
              echo "::error::Code duplication is ${PCT}%, exceeding 3% threshold"

              # Show the duplicate blocks
              python3 -c "
          import json
          data = json.load(open('/tmp/jscpd-report/jscpd-report.json'))
          for d in data.get('duplicates', []):
              fa = d['firstFile']
              sa = d['secondFile']
              print(f\"  {fa['name']}:{fa['startLoc']['line']}-{fa['endLoc']['line']} <-> {sa['name']}:{sa['startLoc']['line']}-{sa['endLoc']['line']}\")
          " 2>/dev/null || true

              exit 1
            fi
          else
            echo "### Code Duplication: 0% (no duplicates found)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always() && steps.detect.outputs.rust_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lcov-coverage
          path: lcov.info

  # ════════════════════════════════════════════════════════════════════════════
  # TIER 2: INTEGRATION (Main Branch Push Only)
  # ════════════════════════════════════════════════════════════════════════════

  test-backend-integration:
    name: 🔗 Backend Integration Tests
    runs-on: ak-ci-runners
    timeout-minutes: 40
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # Disable incremental codegen (#1679): consistent with check-rust and the
    # other heavy Rust compile jobs. Useless in CI's clean checkout, inflates
    # peak RSS.
    env:
      CARGO_INCREMENTAL: "0"
    services:
      postgres:
        # Use the GHCR mirror to avoid Docker Hub anonymous-pull rate limits.
        image: ghcr.io/artifact-keeper/ci-mirror/postgres:16-alpine
        env:
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
          POSTGRES_DB: artifact_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The integration suites under `backend/tests/` insert into real tables
      # (users, api_tokens, repositories, ...) via the SQLx pool. The service
      # container above starts an empty Postgres, so we MUST apply migrations
      # before running tests or the suites panic with `relation "users" does
      # not exist` (regression after #1190 added api_token_cache_flush_tests
      # to this job). Matches the `coverage` job's pattern: sqlx-cli is
      # pre-installed on the `ak-ci-runners` image (see
      # artifact-keeper-iac/runner-images/rust/Dockerfile).
      - name: Wait for Postgres
        env:
          PGPASSWORD: registry
        run: |
          set -euo pipefail
          # The service container's --health-cmd already runs pg_isready
          # internally, but GitHub Actions starts the step before health
          # transitions to "healthy" on slower runners. A short readiness
          # loop from the runner side avoids a flaky first connect. Uses a
          # plain TCP probe via bash so we do not depend on postgresql-client
          # being installed on the runner image.
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then
              echo "Postgres reachable on attempt $i"
              exit 0
            fi
            echo "  waiting for postgres... ($i/30)"
            sleep 1
          done
          echo "ERROR: Postgres did not become reachable within 30s"
          exit 1

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
        run: sqlx migrate run --source backend/migrations

      # `-- --ignored` runs the postgres-backed integration suites under
      # `backend/tests/` that were silently skipped before (#1031). The job
      # provisions postgres but NOT a running HTTP backend, Meilisearch,
      # Trivy, or live cloud credentials, so the suite list below is
      # restricted to tests that need only a Postgres connection:
      #
      #   - lifecycle_policy_tests, api_token_cache_flush_tests,
      #     search_reindex_tests, scan_convert_to_reused_tests,
      #     virtual_members_atomicity_test, virtual_members_duplicate_test,
      #     grpc_sbom_tests (in-process gRPC, no HTTP server),
      #     oci_chunked_upload_cross_repo_tests (#1317 cross-repo session
      #     rejection regression),
      #     sso_oidc_login_callback_e2e_tests (#1617 OIDC login/callback
      #     regression harness; drives the real sso handlers against an
      #     in-process wiremock IdP bound to a non-loopback interface),
      #     sso_saml_acs_e2e_tests (#2212 SAML ACS regression harness; drives
      #     the real saml_login/saml_acs handlers against bergshamra-signed
      #     assertions — no outbound fetch, so no wiremock/SSRF dance).
      #
      # Deliberately excluded (would panic on first .expect() without
      # extra infra, so `--ignored` stays the right gate):
      #
      #   - azure_rbac_live_test, azure_shared_key_live_test, s3_integration
      #     (live cloud creds via std::env::var().expect)
      #   - integration_tests, replication_integration,
      #     tag_filtered_replication_tests, storage_backend_tests
      #     (read TEST_BASE_URL, need a running HTTP backend)
      #   - incus_upload_tests (most cases construct the router without the
      #     optional_auth middleware, so handler `Extension<AuthExtension>`
      #     extracts panic with a 500. Only
      #     `test_chunked_upload_cross_repo_session_rejected` wires the
      #     middleware in, so we run that case specifically as a named
      #     filter below to cover issue #1317 without dragging in the
      #     broken siblings).
      #
      # `--test-threads=1` because the DB-backed suites share schema state
      # through global DELETEs in their cleanup helpers and would race under
      # parallel execution.
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          SQLX_OFFLINE: true
        run: |
          cargo test --workspace --verbose \
            --test lifecycle_policy_tests \
            --test api_token_cache_flush_tests \
            --test grpc_sbom_tests \
            --test search_reindex_tests \
            --test scan_convert_to_reused_tests \
            --test stuck_scan_janitor_tests \
            --test virtual_members_atomicity_test \
            --test virtual_members_duplicate_test \
            --test oci_chunked_upload_cross_repo_tests \
            --test sso_oidc_login_callback_e2e_tests \
            --test sso_saml_acs_e2e_tests \
            --test cache_invalidation_fanout_tests \
            --test age_gate_tests \
            -- --ignored --test-threads=1

      # `incus_upload_tests::test_chunked_upload_cross_repo_session_rejected`
      # is the only case in that file currently wired to run without an HTTP
      # server. Run it explicitly so the #1317 incus regression has matrix
      # coverage too.
      - name: Run incus cross-repo session regression
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          SQLX_OFFLINE: true
        run: |
          cargo test --workspace --verbose \
            --test incus_upload_tests \
            test_chunked_upload_cross_repo_session_rejected \
            -- --ignored --test-threads=1

      # Hit-rate data to evaluate dropping the GHA rust-cache from the unit/clippy jobs (this job has no rust-cache; stats give a no-GHA-cache baseline).
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # ════════════════════════════════════════════════════════════════════════════
  # SMOKE E2E (Every Push/PR) — self-contained via Docker-in-Docker on ARC
  # Spins up fresh backend + postgres, runs native client tests, tears down
  # ════════════════════════════════════════════════════════════════════════════

  smoke-e2e:
    name: 🔥 Smoke E2E Tests
    runs-on: ak-e2e-runners
    needs: [test-backend-unit, build-backend-image]
    if: needs.build-backend-image.result == 'success'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for DinD daemon..."
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              docker version
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done
          docker info >/dev/null 2>&1 || { echo "ERROR: Docker daemon not available"; exit 1; }

      - name: Install Docker Compose
        run: |
          # Skip install if docker compose is already available
          if docker compose version >/dev/null 2>&1; then
            echo "Docker Compose already available:"
            docker compose version
            exit 0
          fi

          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          COMPOSE_VERSION="v2.32.4"
          COMPOSE_BINARY="$DOCKER_CONFIG/cli-plugins/docker-compose"
          mkdir -p "$DOCKER_CONFIG/cli-plugins"

          echo "Downloading Docker Compose ${COMPOSE_VERSION}..."
          curl -fSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o "$COMPOSE_BINARY"

          # Verify download succeeded (curl -f returns non-zero on HTTP errors,
          # but also check file size as a safeguard)
          FILESIZE=$(stat -c%s "$COMPOSE_BINARY" 2>/dev/null || stat -f%z "$COMPOSE_BINARY" 2>/dev/null || echo "0")
          if [ "$FILESIZE" -lt 1000000 ]; then
            echo "ERROR: Downloaded file is ${FILESIZE} bytes (expected >60MB). Download likely failed."
            rm -f "$COMPOSE_BINARY"
            exit 1
          fi

          chmod +x "$COMPOSE_BINARY"
          docker compose version

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download backend image from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-image
          path: /tmp

      - name: Load backend image
        run: |
          gunzip -c /tmp/backend-image.tar.gz | docker load
          docker tag artifact-keeper-backend:pr-test artifact-keeper-backend:test

      - name: Start smoke E2E stack
        run: docker compose -f docker-compose.test.yml --profile smoke up -d

      - name: Wait for tests to complete
        run: |
          echo "Waiting for test containers to finish..."
          timeout 480 docker wait e2e-test-pypi e2e-test-npm e2e-test-cargo e2e-test-proxy-virtual || {
            echo "ERROR: Tests timed out. Container statuses:"
            docker ps -a --filter "name=e2e-test" --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "Backend logs (last 50 lines):"
            docker logs e2e-test-backend --tail 50 2>&1 || true
            exit 1
          }

      - name: Show test results
        if: always()
        run: |
          failed=false
          for test in pypi npm cargo proxy-virtual; do
            container="e2e-test-${test}"
            exit_code=$(docker inspect --format='{{.State.ExitCode}}' "$container" 2>/dev/null || echo "N/A")
            echo ""
            echo "═══════════════════════════════════════════"
            echo "  ${test} — Exit Code: $exit_code"
            echo "═══════════════════════════════════════════"
            docker logs "$container" 2>&1 || true
            if [ "$exit_code" != "0" ]; then failed=true; fi
          done
          if [ "$failed" = "true" ]; then exit 1; fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml --profile smoke down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # CONTAINER BUILDS (PR only, path-filtered, parallel)
  # ════════════════════════════════════════════════════════════════════════════

  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ak-ci-runners
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'push'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      openscap: ${{ steps.filter.outputs.openscap }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'docker/Dockerfile.backend'
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.sqlx/**'
            openscap:
              - 'docker/Dockerfile.openscap'
              - 'scripts/openscap-wrapper.py'

  build-backend-image:
    name: 🐳 Build Backend Image
    runs-on: ak-ci-runners
    timeout-minutes: 45
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.backend
          platforms: linux/amd64
          push: false
          load: true
          tags: artifact-keeper-backend:pr-test
          # Read-only registry cache, warmed by docker-publish.yml on main.
          # No cache-to: PR-triggered jobs must not get packages:write (fork
          # PRs would inherit it — pwn-request risk), and anonymous GHCR
          # reads work because the packages are public.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-backend:buildcache-amd64

      - name: Verify image starts
        run: |
          docker run --rm -d --name ak-test -p 8080:8080 \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            artifact-keeper-backend:pr-test || true
          sleep 2
          docker logs ak-test 2>&1 | head -20 || true
          docker rm -f ak-test 2>/dev/null || true

      - name: Image size
        run: |
          echo "## Backend Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker images artifact-keeper-backend:pr-test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Save image for smoke tests
        run: |
          docker save artifact-keeper-backend:pr-test | gzip > /tmp/backend-image.tar.gz
          ls -lh /tmp/backend-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-image
          path: /tmp/backend-image.tar.gz
          retention-days: 1

  build-openscap-image:
    name: 🐳 Build OpenSCAP Image
    runs-on: ak-ci-runners
    timeout-minutes: 30
    needs: detect-changes
    if: needs.detect-changes.outputs.openscap == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build openscap image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.openscap
          platforms: linux/amd64
          push: false
          load: true
          tags: artifact-keeper-openscap:pr-test
          # Read-only registry cache — see backend image build for rationale.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-openscap:buildcache-amd64

      - name: Verify image starts
        run: |
          docker run --rm -d --name oscap-test -p 8091:8091 \
            artifact-keeper-openscap:pr-test || true
          sleep 3
          docker logs oscap-test 2>&1 | head -20 || true
          docker rm -f oscap-test 2>/dev/null || true

      - name: Image size
        run: |
          echo "## OpenSCAP Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker images artifact-keeper-openscap:pr-test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY (Runs on all events, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit

  # ════════════════════════════════════════════════════════════════════════════
  # FINAL STATUS
  # ════════════════════════════════════════════════════════════════════════════

  ci-complete:
    name: ✅ CI Complete
    runs-on: ak-ci-runners
    timeout-minutes: 15
    needs: [check-rust, test-backend-unit, shell-tests, coverage, test-backend-integration, smoke-e2e, build-backend-image, build-openscap-image, security-audit]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          tier1_pass=true

          # Tier 1 jobs (required)
          for job in check-rust test-backend-unit shell-tests; do
            result="${{ needs.check-rust.result }}"
            [ "$job" = "test-backend-unit" ] && result="${{ needs.test-backend-unit.result }}"
            [ "$job" = "shell-tests" ] && result="${{ needs.shell-tests.result }}"
            if [[ "$result" == "success" ]]; then
              echo "✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $job: $result" >> $GITHUB_STEP_SUMMARY
              tier1_pass=false
            fi
          done

          # Smoke E2E (skipped when backend image build is skipped due to no changes)
          smoke_result="${{ needs.smoke-e2e.result }}"
          if [[ "$smoke_result" == "success" ]]; then
            echo "✅ smoke-e2e" >> $GITHUB_STEP_SUMMARY
          elif [[ "$smoke_result" == "skipped" ]]; then
            echo "⏭️ smoke-e2e (no backend changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ smoke-e2e: $smoke_result" >> $GITHUB_STEP_SUMMARY
            tier1_pass=false
          fi

          # Integration tests (main push only, skip check on PRs)
          integ_result="${{ needs.test-backend-integration.result }}"
          if [[ "$integ_result" == "success" ]]; then
            echo "✅ integration-tests" >> $GITHUB_STEP_SUMMARY
          elif [[ "$integ_result" == "skipped" ]]; then
            echo "⏭️ integration-tests (PR — skipped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ integration-tests: $integ_result" >> $GITHUB_STEP_SUMMARY
            tier1_pass=false
          fi

          # Container builds (PR only, skipped on push or when files unchanged)
          for img in backend openscap; do
            result="${{ needs.build-backend-image.result }}"
            [ "$img" = "openscap" ] && result="${{ needs.build-openscap-image.result }}"
            if [[ "$result" == "success" ]]; then
              echo "✅ build-${img}-image" >> $GITHUB_STEP_SUMMARY
            elif [[ "$result" == "skipped" ]]; then
              echo "⏭️ build-${img}-image (no changes)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ build-${img}-image: $result" >> $GITHUB_STEP_SUMMARY
              tier1_pass=false
            fi
          done

          # Coverage (non-blocking)
          if [[ "${{ needs.coverage.result }}" == "success" ]]; then
            echo "✅ coverage" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ coverage: ${{ needs.coverage.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          # Security audit (blocking)
          if [[ "${{ needs.security-audit.result }}" == "success" ]]; then
            echo "✅ security-audit" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ security-audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
            tier1_pass=false
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$tier1_pass" != "true" ]]; then
            echo "❌ **CI Failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **CI Passed**" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # WINDOWS DEV BUILD (main push only)
  # ════════════════════════════════════════════════════════════════════════════

  build-windows-dev:
    name: 🪟 Windows Cross-Build
    runs-on: ak-ci-runners
    timeout-minutes: 30
    # Only build Windows on main push (not PRs).
    # The release workflow builds Windows binaries for actual releases.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Windows binary (cross-compile)
        env:
          SQLX_OFFLINE: true
          CARGO_TERM_COLOR: always
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          # Bypass sccache while the ak-ci-runners /cache volume / sccache server
          # is unavailable (see check-rust) — it crashed the cross-compile at
          # startup. Revert once the runner cache is restored.
          RUSTC_WRAPPER: ""
        run: cargo build --release --target x86_64-pc-windows-gnu --features vendored-openssl

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/artifact-keeper.exe dist/artifact-keeper-windows-amd64.exe
          cd dist
          sha256sum artifact-keeper-windows-amd64.exe > artifact-keeper-windows-amd64.exe.sha256
          echo "Built: $(ls -lh artifact-keeper-windows-amd64.exe | awk '{print $5}')"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifact-keeper-windows-amd64
          path: |
            dist/artifact-keeper-windows-amd64.exe
            dist/artifact-keeper-windows-amd64.exe.sha256

      # Hit-rate data to evaluate dropping the GHA rust-cache from the unit/clippy jobs (this job has no rust-cache; stats give a no-GHA-cache baseline).
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

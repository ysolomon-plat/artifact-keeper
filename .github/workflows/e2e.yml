name: E2E Tests

on:
  # Manual trigger with configurable options
  workflow_dispatch:
    inputs:
      profile:
        description: 'Docker Compose profile to run'
        type: choice
        options:
          - smoke
          - all
          - pypi
          - npm
          - cargo
          - maven
          - go
          - rpm
          - deb
          - helm
          - conda
          - docker
          - protobuf
          - tag-replication
        default: smoke
      include_stress:
        description: 'Include stress tests'
        type: boolean
        default: false
      include_failure:
        description: 'Include failure injection tests'
        type: boolean
        default: false

  # Allow other workflows to call this workflow (e.g., release.yml)
  workflow_call:
    inputs:
      profile:
        type: string
        default: all
      include_stress:
        type: boolean
        default: true
      include_failure:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # SETUP PKI (Certificates and GPG Keys)
  # ════════════════════════════════════════════════════════════════════════════

  setup-pki:
    name: 🔐 Setup PKI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl gnupg

      - name: Generate certificates
        run: |
          chmod +x scripts/pki/generate-certs.sh
          scripts/pki/generate-certs.sh .pki

      - name: Generate GPG keys
        run: |
          chmod +x scripts/pki/generate-gpg.sh
          scripts/pki/generate-gpg.sh .pki

      - name: List PKI files
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "PWD: $(pwd)"
          ls -la .pki/ || echo "No .pki directory!"
          # Make all PKI files readable for upload
          chmod -R a+r .pki/

      - name: Tar PKI files
        run: tar -cvf pki-assets.tar .pki/

      - name: Upload PKI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pki-assets
          path: pki-assets.tar
          if-no-files-found: error
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # NATIVE CLIENT TESTS
  # ════════════════════════════════════════════════════════════════════════════

  native-client-tests:
    name: 📦 Native Client Tests (${{ inputs.profile || 'smoke' }})
    runs-on: ubuntu-latest
    needs: [setup-pki]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build backend image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile.backend
          load: true
          tags: artifact-keeper-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download PKI assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pki-assets

      - name: Extract PKI assets
        run: |
          tar -xvf pki-assets.tar
          chmod 600 .pki/*.key 2>/dev/null || true
          ls -la .pki/

      - name: Create test scripts directory
        run: mkdir -p scripts/native-tests

      - name: Run native client tests
        run: |
          PROFILE="${{ inputs.profile || 'smoke' }}"
          echo "Running native client tests with profile: $PROFILE"

          if [ "$PROFILE" = "smoke" ] || [ -z "$PROFILE" ]; then
            # Default smoke tests run without a profile flag
            docker compose -f docker-compose.test.yml --profile smoke up \
              --abort-on-container-exit
          else
            docker compose -f docker-compose.test.yml --profile "$PROFILE" up \
              --abort-on-container-exit
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # STRESS TESTS (Optional)
  # ════════════════════════════════════════════════════════════════════════════

  stress-tests:
    name: 🔥 Stress Tests
    runs-on: ubuntu-latest
    needs: [native-client-tests]
    if: ${{ inputs.include_stress == true || inputs.include_stress == 'true' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start services
        run: |
          docker compose -f docker-compose.test.yml up -d postgres backend
          sleep 30  # Wait for services to be healthy

      - name: Run stress tests
        run: |
          chmod +x scripts/stress/run-concurrent-uploads.sh 2>/dev/null || true
          if [ -f scripts/stress/run-concurrent-uploads.sh ]; then
            scripts/stress/run-concurrent-uploads.sh 100
          else
            echo "Stress test script not found, skipping"
          fi

      - name: Validate results
        run: |
          if [ -f scripts/stress/validate-results.sh ]; then
            scripts/stress/validate-results.sh
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # FAILURE INJECTION TESTS (Optional)
  # ════════════════════════════════════════════════════════════════════════════

  failure-tests:
    name: 💥 Failure Tests
    runs-on: ubuntu-latest
    needs: [native-client-tests]
    if: ${{ inputs.include_failure == true || inputs.include_failure == 'true' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start services
        run: |
          docker compose -f docker-compose.test.yml up -d postgres backend
          sleep 30  # Wait for services to be healthy

      - name: Run failure injection tests
        run: |
          chmod +x scripts/failure/*.sh 2>/dev/null || true
          if [ -f scripts/failure/run-all.sh ]; then
            scripts/failure/run-all.sh
          else
            echo "Failure test scripts not found, running individual tests..."
            [ -f scripts/failure/test-server-crash.sh ] && scripts/failure/test-server-crash.sh || true
            [ -f scripts/failure/test-db-disconnect.sh ] && scripts/failure/test-db-disconnect.sh || true
            [ -f scripts/failure/test-storage-failure.sh ] && scripts/failure/test-storage-failure.sh || true
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # E2E SUMMARY
  # ════════════════════════════════════════════════════════════════════════════

  e2e-complete:
    name: ✅ E2E Complete
    runs-on: ubuntu-latest
    needs: [native-client-tests, stress-tests, failure-tests]
    if: always()
    steps:
      - name: Check E2E status
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Profile**: ${{ inputs.profile || 'smoke' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Stress Tests**: ${{ inputs.include_stress }}" >> $GITHUB_STEP_SUMMARY
          echo "**Failure Tests**: ${{ inputs.include_failure }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          overall_pass=true

          # Native Client Tests
          if [[ "${{ needs.native-client-tests.result }}" == "success" ]]; then
            echo "✅ Native Client Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Native Client Tests: ${{ needs.native-client-tests.result }}" >> $GITHUB_STEP_SUMMARY
            overall_pass=false
          fi

          # Stress Tests (only check if enabled)
          if [[ "${{ inputs.include_stress }}" == "true" ]]; then
            stress_result="${{ needs.stress-tests.result }}"
            if [[ "$stress_result" == "success" ]]; then
              echo "✅ Stress Tests: Passed" >> $GITHUB_STEP_SUMMARY
            elif [[ "$stress_result" == "skipped" ]]; then
              echo "⏭️ Stress Tests: Skipped (conditional)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Stress Tests: $stress_result" >> $GITHUB_STEP_SUMMARY
              overall_pass=false
            fi
          else
            echo "⏭️ Stress Tests: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Failure Tests (only check if enabled)
          if [[ "${{ inputs.include_failure }}" == "true" ]]; then
            failure_result="${{ needs.failure-tests.result }}"
            if [[ "$failure_result" == "success" ]]; then
              echo "✅ Failure Tests: Passed" >> $GITHUB_STEP_SUMMARY
            elif [[ "$failure_result" == "skipped" ]]; then
              echo "⏭️ Failure Tests: Skipped (conditional)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Failure Tests: $failure_result" >> $GITHUB_STEP_SUMMARY
              overall_pass=false
            fi
          else
            echo "⏭️ Failure Tests: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$overall_pass" != "true" ]]; then
            echo "❌ **E2E Failed**: One or more test suites failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **E2E Passed**: All test suites completed successfully" >> $GITHUB_STEP_SUMMARY

# Configuration for cargo-audit
# See https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# List of advisory IDs to ignore
ignore = [
    # rsa 0.9.10 - Marvin Attack timing sidechannel
    # No fix available upstream. This is a transitive dependency from sqlx-mysql
    # which we don't use (we use postgres). The vulnerability requires:
    # 1. An attacker to have network access to the server
    # 2. Ability to measure timing differences with high precision
    # 3. The server to be using RSA for authentication
    # Risk is low for our use case as we don't use MySQL or RSA authentication.
    "RUSTSEC-2023-0071",

    # wasmtime advisories from the 2026-04-09 batch (RUSTSEC-2026-0086,
    # 0088, 0089, 0094, 0095, 0096) are resolved by the wasmtime 24 -> 36.0.7
    # upgrade tracked in issue #691. No wasmtime ignores needed.

    # rand unsoundness: aliased mutable references when both `log` and
    # `thread_rng` features are enabled and a custom logger reentrantly calls
    # rand::rng() during reseed. Reaches us only via transitive deps
    # (totp-rs, quinn-proto, object_store) that pin pre-fix rand versions
    # (0.8.5, 0.9.2, 0.10.0; fixed in 0.8.6 / 0.9.3 / 0.10.1). We do not
    # enable the `log` feature on `rand`, and our loggers do not call
    # rand::rng(), so the unsound code path is unreachable from artifact-keeper.
    # Re-evaluate once upstream deps bump their rand pins.
    "RUSTSEC-2026-0097",

    # quick-xml XML-parser DoS batch (RUSTSEC-2026-0194: O(N^2) start-tag
    # duplicate-attribute check; RUSTSEC-2026-0195: unbounded NsReader
    # namespace-declaration allocation; both fixed in quick-xml >= 0.41.0).
    # Our DIRECT quick-xml dependency is now 0.41.0, which patches every
    # attacker-reachable parse path (SAML response parsing, proxied
    # maven-metadata/nuget, rpm, and artifactory import). The ONLY remaining
    # 0.39.x instance is bundled transitively by object_store 0.13.2, which we
    # use solely to parse trusted operator-configured storage responses
    # (S3/GCS/Azure ListBucket, multipart, and delete XML) -- never attacker
    # input. No published object_store release depends on quick-xml >= 0.41 yet
    # (0.13.2 and 0.14.0 both cap at ^0.39/^0.40.1), so it cannot be upgraded
    # out today. Removal of the object_store-transitive 0.39.x is tracked in
    # issue #2158.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
